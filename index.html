<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>星辰大海的边界 — AI 创作助手</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #f0883e;
    --accent2: #f78166;
    --user-bg: #1a3a5c;
    --ai-bg: #1c2333;
    --green: #3fb950;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    height: 100vh; /* fallback */
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  @supports (height: 100dvh) {
    body { height: 100dvh; }
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #e85d04);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  .header-info p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  .header-actions button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .header-actions button:hover {
    background: var(--border);
    color: var(--text);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar {
    width: 6px;
  }
  .chat-container::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .message {
    max-width: 780px;
    margin: 0 auto 16px;
    padding: 0 24px;
    display: flex;
    gap: 12px;
  }

  .message.user { justify-content: flex-end; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .msg-avatar.ai {
    background: linear-gradient(135deg, var(--accent), #e85d04);
  }

  .msg-avatar.user-avatar {
    background: #2f81f7;
  }

  .msg-content {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.7;
    font-size: 14.5px;
    max-width: 85%;
    word-break: break-word;
  }

  .message.user .msg-content {
    white-space: pre-wrap;
  }

  /* Markdown rendered content styles */
  .msg-content p { margin: 0 0 8px 0; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content h1, .msg-content h2, .msg-content h3 {
    margin: 16px 0 8px 0;
    font-weight: 600;
    color: var(--text);
  }
  .msg-content h1 { font-size: 1.3em; }
  .msg-content h2 { font-size: 1.15em; }
  .msg-content h3 { font-size: 1.05em; }
  .msg-content ul, .msg-content ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .msg-content li { margin: 3px 0; }
  .msg-content blockquote {
    border-left: 3px solid var(--accent);
    margin: 8px 0;
    padding: 4px 12px;
    color: var(--text-dim);
    background: rgba(240, 136, 62, 0.06);
    border-radius: 0 6px 6px 0;
  }
  .msg-content code {
    background: rgba(255,255,255,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: "SF Mono", "Fira Code", "Menlo", monospace;
  }
  .msg-content pre {
    background: rgba(0,0,0,0.3);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .msg-content pre code {
    background: none;
    padding: 0;
  }
  .msg-content strong { color: var(--accent); font-weight: 600; }
  .msg-content em { color: var(--text-dim); }
  .msg-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }
  .msg-content table {
    border-collapse: collapse;
    margin: 8px 0;
    width: 100%;
    font-size: 13px;
  }
  .msg-content th, .msg-content td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .msg-content th {
    background: rgba(255,255,255,0.05);
    font-weight: 600;
  }

  .message.ai .msg-content {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
  }

  .message.user .msg-content {
    background: var(--user-bg);
    border: 1px solid rgba(47, 129, 247, 0.3);
    border-radius: 12px 4px 12px 12px;
    order: -1;
  }

  .message.user .msg-avatar { order: 1; }

  /* Typing indicator */
  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: typing 1.4s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Quick prompts */
  .quick-prompts {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .quick-prompt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-prompt:hover {
    background: var(--border);
    color: var(--text);
    border-color: var(--accent);
  }

  /* Input area */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    flex-shrink: 0;
  }

  .input-wrapper {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14.5px;
    font-family: inherit;
    line-height: 1.5;
    resize: none;
    outline: none;
    max-height: 150px;
    min-height: 44px;
    transition: border-color 0.2s;
  }

  .input-box:focus {
    border-color: var(--accent);
  }

  .input-box::placeholder {
    color: var(--text-dim);
  }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--accent2); }
  .send-btn:disabled {
    background: var(--border);
    cursor: not-allowed;
  }

  .input-hint {
    max-width: 780px;
    margin: 6px auto 0;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  /* Welcome */
  .welcome {
    max-width: 600px;
    margin: 60px auto 30px;
    padding: 0 24px;
    text-align: center;
  }

  .welcome h2 {
    font-size: 24px;
    background: linear-gradient(135deg, var(--accent), #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .welcome p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Mode selector */
  .mode-selector {
    max-width: 780px;
    margin: 0 auto 20px;
    padding: 0 24px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .mode-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active {
    border-color: var(--accent);
    background: rgba(240, 136, 62, 0.1);
    color: var(--accent);
  }

  .mode-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">🌊</div>
  <div class="header-info">
    <h1>星辰大海的边界</h1>
    <p><span class="status-dot"></span>AI 创作助手 · DeepSeek 驱动</p>
  </div>
  <div class="header-actions">
    <button onclick="clearChat()">🗑️ 清空对话</button>
  </div>
</div>

<!-- Chat -->
<div class="chat-container" id="chatContainer">
  <div class="welcome">
    <h2>🌟 星辰大海的边界</h2>
    <p>模仿「星辰大海的边界」公众号风格，进行投资类文章创作和问答。<br>选择一个模式开始，或直接输入你的问题。</p>
  </div>

  <div class="mode-selector">
    <div class="mode-btn" onclick="setMode('chat')">
      <span class="icon">💬</span>对话问答
    </div>
    <div class="mode-btn" onclick="setMode('article')">
      <span class="icon">✍️</span>生成文章
    </div>
    <div class="mode-btn" onclick="setMode('comment')">
      <span class="icon">📊</span>行情点评
    </div>
  </div>

  <div class="quick-prompts" id="quickPrompts">
    <div class="quick-prompt" onclick="usePrompt('帮我写一篇关于AI应用爆发的公众号文章')">✍️ AI应用爆发分析</div>
    <div class="quick-prompt" onclick="usePrompt('用福建的口吻聊聊当前A股的风格切换')">💬 A股风格切换</div>
    <div class="quick-prompt" onclick="usePrompt('今天半导体板块大涨，帮我写一段行情点评')">📊 半导体行情点评</div>
    <div class="quick-prompt" onclick="usePrompt('聊聊你对港股超额收益的看法')">🇭🇰 港股超额收益</div>
    <div class="quick-prompt" onclick="usePrompt('写一篇关于商业航天的投资分析文章')">🚀 商业航天分析</div>
    <div class="quick-prompt" onclick="usePrompt('用星辰风格解读一下全球大通胀逻辑')">🌍 全球大通胀</div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea class="input-box" id="userInput" placeholder="输入你的问题，或描述想要创作的文章主题…" rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">内容由 AI 生成，仅供学习交流，不构成投资建议</div>
</div>

<script>
// ========== CONFIG ==========
const API_URL = 'https://api.deepseek.com/chat/completions';
const API_KEY = 'sk-ae26adf42c4a4c49b23aa2a70e799a7b';
const MODEL   = 'deepseek-chat';

// ========== SYSTEM PROMPT ==========
const SYSTEM_PROMPT = `你是「星辰大海的边界」公众号的作者"福建"。你是一位95后投资人，2014年大学期间开户入市。

## 身份
- 笔名：福建（来自福建）
- 自称：多用"笔者"，偶尔用"我"
- 读者称呼：朋友们、读者们、大家

## 写作风格（必须严格遵守）

### 语气
- 聊天感极强，像朋友圈私聊，不端着不说教
- 口语化："说白了"、"说起来也奇怪"、"其实吧"、"确实"
- 自嘲+真实：公开承认错误和亏损
- 幽默调侃：老马"整活"、老黄"放着大客户不吹"
- 热血但不盲目，看多时加风险提示

### 文章结构
- 开场钩子（个人经历/新闻/金句）→ 核心论点 → 分点论证(1）2）3）) → 收束展望
- 编号用"1）2）3）"，不用markdown标题
- 不用"首先其次再次最后"的八股结构
- 不说"综上所述"、"总而言之"

### 论证方式
- 产业逻辑链：宏观→趋势→供需矛盾→细分方向
- 历史类比："当前XX像2020年的新能源"
- 人物引用：巴菲特、段永平("阿段")、马斯克("老马")、黄仁勋("老黄")
- 数据支撑：精确但不堆砌
- 金融黑话+大白话翻译

### 高频词汇
景气度、催化、分歧、共振、轮动、主线、赛道、带血筹、二阶导、国产替代、渗透率、alpha/beta

### 自造词
老登股（老蓝筹）、古典算力、带血筹、神秘资金、逃逸速度

## 核心投资观点体系

### 底层信念
- 看多中国，看多科技
- "悲观者正确，但乐观者才能赚钱"
- 产业趋势投资："缺啥买啥"
- 概率估值法：终局×概率

### 市场认知
- A股："涨多了一定跌，跌多了一定涨"
- 港股：像潮汐，赚钱概率低但赔率高
- 美股：强者恒强，听美联储的话
- 资金面：险资最坚定，量化占1/3成交，外资看汇率

### 产业判断
- AI："2026大模型=2006互联网"，从I到R切换
- 半导体：国产替代核心叙事，设备是二阶导
- 商业航天：类比2020新能源
- 消费/医药：十年一遇的跷跷板机会
- 大宗：全球大通胀时代重启

### 金句（适当引用）
- "缺啥东西，咱就买啥行业的股票"
- "数星星不如数月亮，数月亮不如数太阳"
- "集中投资是一把屠龙刀"
- "投资不止是为了赚钱，而是修行的一部分"
- "他强任他强，清风拂山岗"

## 注意事项
- 不推荐具体金融产品或ETF代码
- 不提供具体买卖时点建议
- 保持"看多中国、看多科技、理性乐观"的基调
- 内容仅供学习交流，不构成投资建议
- 回答要有深度，不要空泛
- 写文章时自然分段，每段3-5行`;

// ========== STATE ==========
let messages = [];
let currentMode = 'chat';
let isStreaming = false;

// ========== MODE ==========
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const input = document.getElementById('userInput');
  const placeholders = {
    chat: '输入你的问题，或描述想要创作的文章主题…',
    article: '描述文章主题，例如：写一篇关于AI应用爆发的分析文章…',
    comment: '描述今日行情，例如：今天创业板大涨3%，科技股领涨…'
  };
  input.placeholder = placeholders[mode];
}

// ========== UI HELPERS ==========
function renderMarkdown(text) {
  try {
    return marked.parse(text, { breaks: true, gfm: true });
  } catch (e) {
    return escapeHtml(text);
  }
}

function addMessage(role, content) {
  const container = document.getElementById('chatContainer');

  // Hide welcome on first message
  const welcome = container.querySelector('.welcome');
  const modes = container.querySelector('.mode-selector');
  const prompts = document.getElementById('quickPrompts');
  if (welcome) welcome.style.display = 'none';
  if (modes) modes.style.display = 'none';
  if (prompts) prompts.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = role === 'ai'
    ? '<div class="msg-avatar ai">🌊</div>'
    : '<div class="msg-avatar user-avatar">👤</div>';

  const renderedContent = role === 'ai' ? renderMarkdown(content) : escapeHtml(content);
  div.innerHTML = `${avatar}<div class="msg-content">${renderedContent}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingMsg';
  div.innerHTML = `
    <div class="msg-avatar ai">🌊</div>
    <div class="msg-content">
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ========== AUTO-RESIZE TEXTAREA ==========
const input = document.getElementById('userInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});

// ========== MOBILE KEYBOARD ADAPTATION ==========
// Use visualViewport API to adapt when virtual keyboard appears
if (window.visualViewport) {
  const chatContainer = document.getElementById('chatContainer');
  const inputArea = document.querySelector('.input-area');

  function onViewportResize() {
    const vv = window.visualViewport;
    // Calculate keyboard height
    const keyboardHeight = window.innerHeight - vv.height;

    if (keyboardHeight > 100) {
      // Keyboard is open — adjust layout
      document.body.style.height = vv.height + 'px';
      // Scroll chat to bottom
      requestAnimationFrame(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    } else {
      // Keyboard closed — restore
      document.body.style.height = '';
    }
  }

  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

// Also handle focus/blur for older browsers
input.addEventListener('focus', () => {
  setTimeout(() => {
    const chatContainer = document.getElementById('chatContainer');
    chatContainer.scrollTop = chatContainer.scrollHeight;
    // On iOS, scroll input into view
    input.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 300);
});

input.addEventListener('blur', () => {
  // Restore body height on blur
  setTimeout(() => { document.body.style.height = ''; }, 100);
});

// ========== SEND MESSAGE ==========
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  // Add mode-specific prefix
  let userContent = text;
  if (currentMode === 'article' && !text.includes('写') && !text.includes('文章')) {
    userContent = `请用星辰大海的边界风格，写一篇关于"${text}"的公众号文章。`;
  } else if (currentMode === 'comment' && !text.includes('点评')) {
    userContent = `请用星辰大海的边界风格，对以下行情进行点评：${text}`;
  }

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  messages.push({ role: 'user', content: userContent });

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const typingDiv = addTypingIndicator();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages
        ],
        stream: true,
        temperature: 0.85,
        max_tokens: 4096,
      })
    });

    if (!response.ok) {
      const err = await response.text();
      throw new Error(`API Error ${response.status}: ${err}`);
    }

    // Remove typing indicator, add actual message
    typingDiv.remove();
    const aiDiv = addMessage('ai', '');
    const contentEl = aiDiv.querySelector('.msg-content');
    let fullText = '';

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') continue;

        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            contentEl.innerHTML = renderMarkdown(fullText);
            document.getElementById('chatContainer').scrollTop =
              document.getElementById('chatContainer').scrollHeight;
          }
        } catch (e) { /* skip malformed chunks */ }
      }
    }

    messages.push({ role: 'assistant', content: fullText });

  } catch (err) {
    typingDiv?.remove();
    addMessage('ai', `❌ 请求失败：${err.message}\n\n请检查网络连接和 API Key。`);
    console.error(err);
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function usePrompt(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function clearChat() {
  messages = [];
  const container = document.getElementById('chatContainer');
  container.innerHTML = `
    <div class="welcome">

      <div class="quick-prompt" onclick="usePrompt('用星辰风格解读一下全球大通胀逻辑')">🌍 全球大通胀</div>
    </div>`;
}
