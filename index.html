<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --surface3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-dimmer: #656d76;
  --accent: #f0883e;
  --accent2: #f78166;
  --accent-dim: rgba(240,136,62,0.15);
  --user-bg: #1f3a5f;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; height:100%; overflow:hidden; }
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--text);
  height:100dvh; height:100vh;
  display:flex; flex-direction:column; overflow:hidden;
  position:fixed; top:0; left:0; right:0; bottom:0;
}

/* ===== Header ===== */
.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; z-index:10; gap:8px;
}
.header-left { display:flex; align-items:center; gap:8px; min-width:0; }
.header h1 { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.header-sub { font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:4px; }
.status-dot { width:6px; height:6px; background:var(--green); border-radius:50%; flex-shrink:0; }
.header-actions { display:flex; gap:6px; flex-shrink:0; }
.hdr-btn {
  background:none; border:1px solid var(--border); color:var(--text-dim);
  padding:5px 10px; border-radius:8px; font-size:12px; cursor:pointer;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
}
.hdr-btn:active { background:var(--border); color:var(--text); }
.context-badge {
  background:var(--accent-dim); color:var(--accent); font-size:10px;
  padding:2px 6px; border-radius:10px; font-weight:600;
}

/* ===== Chat ===== */
.chat-container { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 16px; }

.welcome { text-align:center; padding:24px 16px 12px; }
.welcome h2 { font-size:20px; margin-bottom:6px; }
.welcome p { color:var(--text-dim); font-size:13px; line-height:1.6; }

.quick-prompts {
  max-width:600px; margin:12px auto 0; padding:0 8px;
  display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
}
.quick-prompt {
  background:var(--surface2); border:1px solid var(--border); color:var(--text-dim);
  padding:8px 14px; border-radius:18px; font-size:13px; cursor:pointer;
  white-space:nowrap; transition:all .15s;
}
.quick-prompt:active { background:var(--border); color:var(--text); }

/* ===== Messages ===== */
.msg-wrap { max-width:640px; margin:0 auto 4px; }
.msg-turn-label {
  font-size:10px; color:var(--text-dimmer); text-align:center;
  margin:10px 0 4px; display:flex; align-items:center; gap:8px; justify-content:center;
}
.msg-turn-label::before, .msg-turn-label::after {
  content:''; flex:1; max-width:60px; height:1px; background:var(--border);
}
.message { display:flex; gap:10px; margin-bottom:4px; }
.message.user { flex-direction:row-reverse; }
.msg-avatar {
  width:30px; height:30px; border-radius:50%; display:flex;
  align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:2px;
}
.msg-avatar.ai { background:linear-gradient(135deg,#f0883e,#f78166); }
.msg-avatar.user-avatar { background:var(--user-bg); }

.msg-body { max-width:85%; min-width:0; }
.msg-content {
  padding:10px 14px; border-radius:12px; line-height:1.7; font-size:14px;
  word-break:break-word;
}
.message.ai .msg-content { background:var(--surface2); }
.message.user .msg-content { background:var(--user-bg); white-space:pre-wrap; }

/* Markdown */
.msg-content p { margin:0 0 8px; } .msg-content p:last-child { margin-bottom:0; }
.msg-content h1,.msg-content h2,.msg-content h3 { margin:12px 0 6px; font-weight:600; }
.msg-content h1 { font-size:1.15em; } .msg-content h2 { font-size:1.1em; } .msg-content h3 { font-size:1.05em; }
.msg-content ul,.msg-content ol { margin:4px 0; padding-left:20px; }
.msg-content li { margin:2px 0; }
.msg-content blockquote {
  border-left:3px solid var(--accent); margin:6px 0; padding:4px 10px;
  color:var(--text-dim); background:rgba(240,136,62,.06); border-radius:0 6px 6px 0;
}
.msg-content code { background:rgba(255,255,255,.08); padding:1px 5px; border-radius:4px; font-size:.9em; font-family:"SF Mono","Menlo",monospace; }
.msg-content pre { background:rgba(0,0,0,.3); padding:10px; border-radius:8px; overflow-x:auto; margin:6px 0; }
.msg-content pre code { background:none; padding:0; }
.msg-content strong { color:var(--accent); font-weight:600; }
.msg-content em { color:var(--text-dim); }
.msg-content table { border-collapse:collapse; margin:6px 0; width:100%; font-size:13px; }
.msg-content th,.msg-content td { border:1px solid var(--border); padding:5px 8px; text-align:left; }
.msg-content th { background:rgba(255,255,255,.05); font-weight:600; }
.msg-content hr { border:none; border-top:1px solid var(--border); margin:10px 0; }

.typing::after { content:'▋'; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ===== Message Actions ===== */
.msg-actions {
  display:flex; gap:2px; margin-top:4px; opacity:0; transition:opacity .2s;
}
.msg-wrap:hover .msg-actions, .msg-actions.show { opacity:1; }
/* Always show on touch devices */
@media (hover:none) { .msg-actions { opacity:1; } }

.msg-act-btn {
  background:none; border:none; color:var(--text-dimmer); font-size:12px;
  padding:3px 8px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:3px;
}
.msg-act-btn:hover { background:var(--surface3); color:var(--text-dim); }
.msg-act-btn:active { background:var(--border); }
.msg-act-btn .ico { font-size:13px; }
.msg-act-btn.copied { color:var(--green); }

.char-count { font-size:10px; color:var(--text-dimmer); margin-left:auto; padding:3px 4px; }

/* ===== Assist Panel (slash commands) ===== */
.assist-panel {
  display:none; background:var(--surface); border:1px solid var(--border);
  border-radius:12px; max-width:600px; margin:0 auto 8px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.assist-panel.show { display:block; }
.assist-header {
  padding:8px 14px; border-bottom:1px solid var(--border);
  font-size:12px; color:var(--text-dim); display:flex; justify-content:space-between; align-items:center;
}
.assist-close { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:16px; padding:2px 6px; }
.assist-grid { display:flex; flex-wrap:wrap; padding:8px; gap:6px; }
.assist-item {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:8px 14px; border-radius:10px; font-size:13px; cursor:pointer;
  display:flex; align-items:center; gap:6px; transition:all .15s;
}
.assist-item:active { background:var(--border); }
.assist-item .ai { font-size:15px; }

/* ===== File upload ===== */
.upload-btn {
  width:38px; height:38px; border-radius:10px; background:var(--surface2);
  border:1px solid var(--border); color:var(--text-dim); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.upload-btn:active { background:var(--border); color:var(--text); }
.file-tag {
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(240,136,62,.12); border:1px solid rgba(240,136,62,.3);
  color:var(--accent); padding:3px 9px; border-radius:14px; font-size:11px;
}
.file-tag .remove { cursor:pointer; opacity:.6; font-size:13px; }
.file-tag .remove:active { opacity:1; }

/* ===== Input ===== */
.input-area {
  background:var(--surface); border-top:1px solid var(--border);
  padding:8px 16px; padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
  flex-shrink:0; z-index:10;
}
#filePreview { max-width:600px; margin:0 auto 6px; padding:0; display:none; flex-wrap:wrap; gap:5px; }
.input-wrapper {
  max-width:600px; margin:0 auto; display:flex; align-items:flex-end; gap:6px;
}
.input-box {
  flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:9px 12px; border-radius:12px; font-size:15px; line-height:1.4;
  resize:none; outline:none; font-family:inherit; min-height:38px; max-height:150px;
}
.input-box::placeholder { color:var(--text-dim); }
.input-box:focus { border-color:var(--accent); }

.send-btn {
  width:38px; height:38px; border-radius:10px; background:var(--accent);
  border:none; color:white; font-size:16px; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.send-btn:active { opacity:.8; }
.send-btn:disabled { opacity:.4; }
.send-btn.stop-mode { background:var(--red); }

.input-meta {
  display:flex; justify-content:space-between; align-items:center;
  max-width:600px; margin:4px auto 0; padding:0 2px;
}
.input-hint { font-size:11px; color:var(--text-dimmer); }
.input-counter { font-size:11px; color:var(--text-dimmer); }

/* ===== Toast ===== */
.toast {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,.85); color:white; padding:10px 20px; border-radius:10px;
  font-size:14px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none;
}
.toast.show { opacity:1; }

/* ===== Export Modal ===== */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  width:90%; max-width:400px; padding:20px; box-shadow:0 8px 30px rgba(0,0,0,.4);
}
.modal h3 { font-size:16px; margin-bottom:12px; }
.modal-btn {
  display:flex; align-items:center; gap:10px; width:100%;
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:12px 16px; border-radius:10px; font-size:14px; cursor:pointer; margin-bottom:8px;
  transition:all .15s;
}
.modal-btn:active { background:var(--border); }
.modal-btn .mico { font-size:18px; }
.modal-btn:last-child { margin-bottom:0; }
.modal-cancel {
  background:none; border:none; color:var(--text-dim); width:100%;
  padding:10px; font-size:14px; cursor:pointer; margin-top:6px;
}
</style>

// ========== SYSTEM PROMPT (V2 全量蒸馏 · 创作增强) ==========
const SYSTEM_PROMPT = `你是「星辰大海的边界」公众号的作者"福建"。你是一位95后独立投资人，2014年大学期间开户入市，历经多轮牛熊，形成了独特的产业趋势投资风格。同时你也是一位出色的内容创作者，擅长将复杂的投资逻辑用生动有趣的方式表达。

## ⚡ 最高优先级

### 创作模式判断：
- 当用户要求"写文章""长文分析""写一篇"时 → 输出完整文章（800-2000字），含开头钩子+正文编号论证+金句结尾

### 锐度规则：
1. 每个回答至少1个反共识观点
2. 给具体判断不给模糊方向
3. 用内部人视角说话
4. 禁用：❌"值得关注"❌"可能有机会"❌"综上所述"❌"总的来说"❌"首先其次再次最后"❌"您"

## 身份
- 笔名：福建（来自福建），自称"笔者"或"我"
- 读者称呼：朋友们、兄弟姐妹们、大家

## 写作风格

### 语气（四种模式自由切换）
1. 热血乐观（~40%）：感叹号、排比、金句收尾
2. 自嘲真实（~25%）：直面失败、"后悔啊""心态崩了"
3. 幽默调侃（~20%）：段子感、"物理定律不存在了""某队偷感很重"
4. 深沉思辨（~15%）：引用经典/佛法，文学性

### 口语化表达
说白了、其实吧、确实、你们可能想不到、有一说一、怎么说呢、不夸张的说、好家伙、这不、走一步看一步吧

### 文章结构
- 开场钩子（个人经历/八卦35% > 反直觉数据25% > 新闻切入20% > 金句10% > 直接喊话10%）

### 人物称呼
巴菲特→巴老/老巴、段永平→阿段/大道、马斯克→老马、黄仁勋→老黄/黄教主、国家队→某队/神秘力量、监管→村长/村里/上峰、游资→柚子

### 自造词
老登股(传统蓝筹)、小登(新兴科技)、带血筹(恐慌后廉价筹码)、古典算力、达链(英伟达链)、银伟达(银行涨超英伟达)、光模块三杰/易中天(新易盛中际旭创天孚通信)、电风扇(板块快速轮动)、恐贪指数、逃逸速度、老登+柚子模式

## 核心投资框架

### 底层信念
- 看多中国国运
- "悲观者正确，但乐观者才能赚钱"
- "缺啥买啥"，找矛盾最尖锐环节
- "数星星不如数月亮，数月亮不如数太阳"——买龙头
- 万物皆周期，"大暑之后容易大寒"

### 产业判断
- AI："2026大模型=2006互联网"，矛盾从算力→存力(HBM)→应用

// ========== STATE ==========
let messages = [];       // Full conversation history [{role, content, id}]
let isStreaming = false;
let abortController = null;
let uploadedFiles = [];
let turnCount = 0;
let currentStreamMsgId = null;

function genId() { return 'msg_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ========== FILE UPLOAD ==========
async function handleFileUpload(event) {
  const files = event.target.files;
  if (!files.length) return;
  for (const file of files) {
    const ext = file.name.split('.').pop().toLowerCase();
    try {
      let content = '';
      if (ext === 'docx' || ext === 'doc') {
        const ab = await file.arrayBuffer();
        const r = await mammoth.extractRawText({ arrayBuffer: ab });
        content = r.value;
      } else if (ext === 'pptx' || ext === 'ppt') {
        content = await extractPptxText(file);
      } else if (ext === 'pdf') {
        content = await extractPdfText(file);
      } else {
        content = await file.text();
      }
      let truncated = false;
      if (content.length > 15000) { content = content.substring(0,15000); truncated = true; }
      if (content.trim()) {
        uploadedFiles.push({ name: file.name, content, truncated });
        renderFileTags();
      }
    } catch (e) {
      try {
        let content = await file.text();
        if (content.length > 15000) content = content.substring(0,15000);
        if (content.trim()) { uploadedFiles.push({ name: file.name, content, truncated: content.length >= 15000 }); renderFileTags(); }
      } catch { showToast('无法解析: ' + file.name); }
    }
  }
  event.target.value = '';
}
async function extractPptxText(file) {
  const JSZip = window.JSZip;
  if (!JSZip) return await file.text();
  const zip = await JSZip.loadAsync(file);
  let text = '';
  const slides = Object.keys(zip.files).filter(n => n.match(/ppt\/slides\/slide\d+\.xml/)).sort();
  for (const sf of slides) {
    const xml = await zip.files[sf].async('string');
    const m = xml.match(/<a:t[^>]*>(.*?)<\/a:t>/g);
    if (m) text += m.map(x => x.replace(/<[^>]+>/g,'')).join(' ') + '\n\n';
  }
  return text || '(PPT内容提取失败)';
}
async function extractPdfText(file) {
  try {
    const ab = await file.arrayBuffer();
    const lib = window.pdfjsLib;
    if (!lib) return '(PDF库未加载)';
    const pdf = await lib.getDocument({data:ab}).promise;
    let text = '';
    for (let i=1; i<=Math.min(pdf.numPages,30); i++) {
      const pg = await pdf.getPage(i);
      const c = await pg.getTextContent();
      text += c.items.map(x=>x.str).join(' ') + '\n\n';
    }
    return text;
  } catch(e) { return '(PDF解析失败)'; }
}
function removeFile(i) { uploadedFiles.splice(i,1); renderFileTags(); }
function renderFileTags() {
  const p = document.getElementById('filePreview');
  if (!uploadedFiles.length) { p.style.display='none'; p.innerHTML=''; return; }
  p.style.display = 'flex';
  p.innerHTML = uploadedFiles.map((f,i) =>
    `<div class="file-tag">📄 ${f.name}${f.truncated?' (截取)':''}<span class="remove" onclick="removeFile(${i})">✕</span></div>`
  ).join('');
}
function buildFileContext() {
  if (!uploadedFiles.length) return '';
  let ctx = '\n\n---\n以下是上传的参考素材，请深度消化后融入你的风格重新表达：\n\n';
  for (const f of uploadedFiles) ctx += `【${f.name}】\n${f.content}\n\n`;
  return ctx;
}

// ========== UI HELPERS ==========
function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function renderMarkdown(t) {
  try {
    const parse = (typeof marked==='function') ? marked : (marked.parse||marked);
    return parse(t, {breaks:true, gfm:true});
  } catch { return escapeHtml(t).replace(/\n/g,'<br>'); }
}

function showToast(msg, dur=1500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function updateContextBadge() {
  const turns = messages.filter(m=>m.role==='user').length;
  document.getElementById('contextBadge').textContent = turns + '轮';
}

// ========== ADD MESSAGE TO DOM ==========
function hideWelcome() {
  const w = document.getElementById('welcomeBlock');
  const q = document.getElementById('quickPrompts');
  if (w) w.style.display = 'none';
  if (q) q.style.display = 'none';
}

function addTurnLabel() {
  turnCount++;
  const container = document.getElementById('chatContainer');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.innerHTML = `<div class="msg-turn-label">第 ${turnCount} 轮</div>`;
  container.appendChild(wrap);
}

function addUserMessage(text) {
  hideWelcome();
  addTurnLabel();
  const container = document.getElementById('chatContainer');
  const id = genId();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.dataset.msgId = id;
  wrap.innerHTML = `
    <div class="message user">
      <div class="msg-avatar user-avatar">👤</div>
      <div class="msg-body">
        <div class="msg-content">${escapeHtml(text)}</div>
      </div>
    </div>
    <div class="msg-actions" style="justify-content:flex-end;">
      <button class="msg-act-btn" onclick="editUserMsg('${id}')"><span class="ico">✏️</span>编辑</button>
    </div>`;
  container.appendChild(wrap);
  scrollToBottom();
  return id;
}

function addAiMessage() {
  const container = document.getElementById('chatContainer');
  const id = genId();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.dataset.msgId = id;
  wrap.innerHTML = `
    <div class="message ai">
      <div class="msg-avatar ai">🌊</div>
      <div class="msg-body">
        <div class="msg-content typing" id="content_${id}"></div>
      </div>
    </div>
    <div class="msg-actions" id="actions_${id}" style="display:none;">
      <button class="msg-act-btn" onclick="copyMsg('${id}')"><span class="ico">📋</span>复制</button>
      <button class="msg-act-btn" onclick="regenerateMsg('${id}')"><span class="ico">🔄</span>重新生成</button>
      <span class="char-count" id="chars_${id}"></span>
    </div>`;
  container.appendChild(wrap);
  scrollToBottom();
  return id;
}

function finalizeAiMessage(id, text) {
  const el = document.getElementById('content_' + id);
  if (el) { el.classList.remove('typing'); el.innerHTML = renderMarkdown(text); }
  const actions = document.getElementById('actions_' + id);
  if (actions) actions.style.display = 'flex';
  const chars = document.getElementById('chars_' + id);
  if (chars) chars.textContent = text.length + ' 字';
}

function scrollToBottom() {
  const c = document.getElementById('chatContainer');
  requestAnimationFrame(()=>{ c.scrollTop = c.scrollHeight; });
}

// ========== COPY MESSAGE ==========
function copyMsg(id) {
  const msg = messages.find(m => m.id === id);
  if (!msg) return;
  navigator.clipboard.writeText(msg.content).then(()=>{
    showToast('已复制到剪贴板 ✓');
  }).catch(()=>{
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = msg.content;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制 ✓');
  });
}

// ========== EDIT USER MESSAGE ==========
function editUserMsg(id) {
  const msg = messages.find(m => m.id === id);
  if (!msg || isStreaming) return;
  const input = document.getElementById('userInput');
  input.value = msg.content;
  input.focus();
  onInputChange();
  // Remove this turn and everything after
  const idx = messages.indexOf(msg);
  if (idx >= 0) {
    messages.splice(idx);
    // Remove DOM elements after this message
    const allWraps = document.querySelectorAll('.msg-wrap');
    let found = false;
    allWraps.forEach(w => {
      if (w.dataset.msgId === id) found = true;
      if (found) w.remove();
    });
    turnCount = Math.max(0, turnCount - 1);
    updateContextBadge();
  }
}

// ========== REGENERATE ==========
async function regenerateMsg(id) {
  if (isStreaming) return;
  const idx = messages.findIndex(m => m.id === id);
  if (idx < 0) return;
  // Remove the AI message
  messages.splice(idx, 1);
  const wrap = document.querySelector(`[data-msg-id="${id}"]`);
  if (wrap) wrap.remove();
  // Re-send with current context
  await streamAiResponse();
}

// ========== ASSIST PANEL ==========
function onInputChange() {
  const input = document.getElementById('userInput');
  const val = input.value;
  // Auto-resize
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
  // Show assist panel on /
  if (val === '/') {
    showAssist();
  } else {
    hideAssist();
  }
  // Character counter
  const counter = document.getElementById('inputCounter');
  if (val.length > 0) {
    counter.textContent = val.length + ' 字';
  } else {
    counter.textContent = '';
  }
}

function showAssist() { document.getElementById('assistPanel').classList.add('show'); }
function hideAssist() { document.getElementById('assistPanel').classList.remove('show'); }

function insertAssist(text) {
  const input = document.getElementById('userInput');
  input.value = text;
  input.focus();
  // Place cursor at end
  input.setSelectionRange(input.value.length, input.value.length);
  hideAssist();
  onInputChange();
}

// ========== SEND / STOP ==========
function onSendClick() {
  if (isStreaming) {
    stopStream();
  } else {
    sendMessage();
  }
}

function stopStream() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  let userContent = text;
  const userId = addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';
  onInputChange();

  const fileCtx = buildFileContext();
  if (fileCtx) { userContent += fileCtx; uploadedFiles = []; renderFileTags(); }

  const msgObj = { role:'user', content:userContent, id:userId };
  messages.push(msgObj);
  updateContextBadge();

  await streamAiResponse();
}

async function streamAiResponse() {
  isStreaming = true;
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.innerHTML = '⏹';
  sendBtn.classList.add('stop-mode');
  sendBtn.disabled = false;

  const aiId = addAiMessage();
  currentStreamMsgId = aiId;
  const contentEl = document.getElementById('content_' + aiId);

  abortController = new AbortController();

  try {
    // Build context — keep last 20 messages for deeper context
    const contextMessages = messages.filter(m=>m.role==='user'||m.role==='assistant').slice(-20);
    const apiMessages = contextMessages.map(m=>({role:m.role, content:m.content}));

    const resp = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
      body: JSON.stringify({
        model:'deepseek-chat',
        messages:[{role:'system',content:SYSTEM_PROMPT}, ...apiMessages],
        stream:true,
        max_tokens:4000,
        temperature:0.85,
      }),
      signal: abortController.signal,
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const {done,value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, {stream:true});
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ') || line.includes('[DONE]')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          const delta = data.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            contentEl.innerHTML = renderMarkdown(fullText);
            scrollToBottom();
          }
        } catch {}
      }
    }

    finalizeAiMessage(aiId, fullText);
    messages.push({role:'assistant', content:fullText, id:aiId});

  } catch (err) {
    contentEl.classList.remove('typing');
    if (err.name === 'AbortError') {
      // User stopped
      const partial = contentEl.textContent || '';
      if (partial) {
        finalizeAiMessage(aiId, partial);
        messages.push({role:'assistant', content:partial, id:aiId});
        showToast('已停止生成');
      } else {
        contentEl.innerHTML = `<span style="color:var(--text-dim)">已停止</span>`;
      }
    } else {
      contentEl.innerHTML = `<span style="color:var(--red)">请求失败: ${err.message}</span>`;
    }
  }

  isStreaming = false;
  currentStreamMsgId = null;
  abortController = null;
  sendBtn.innerHTML = '➤';
  sendBtn.classList.remove('stop-mode');
  sendBtn.disabled = false;
  updateContextBadge();
}

// ========== EXPORT ==========
function showExportModal() {
  if (messages.length === 0) { showToast('暂无对话内容'); return; }
  document.getElementById('exportModal').classList.add('show');
}
function hideExportModal() { document.getElementById('exportModal').classList.remove('show'); }

function exportAs(format) {
  hideExportModal();
  const convMessages = messages.filter(m=>m.role==='user'||m.role==='assistant');
  if (!convMessages.length) { showToast('暂无内容'); return; }

  let output = '';
  if (format === 'markdown') {
    output = '# 星辰大海的边界 · 对话记录\n\n';
    let turn = 0;
    for (const m of convMessages) {
      if (m.role === 'user') { turn++; output += `---\n\n### 第 ${turn} 轮\n\n`; }
      const label = m.role === 'user' ? '**🧑 我：**' : '**🌊 星辰：**';
      output += `${label}\n\n${m.content}\n\n`;
    }
  } else {
    let turn = 0;
    for (const m of convMessages) {
      if (m.role === 'user') { turn++; output += `=== 第 ${turn} 轮 ===\n\n`; }
      const label = m.role === 'user' ? '我：' : '星辰：';
      output += `${label}\n${m.content}\n\n`;
    }
  }

  if (format === 'clipboard') {
    navigator.clipboard.writeText(output).then(()=>showToast('已复制全部对话 ✓')).catch(()=>showToast('复制失败'));
    return;
  }

  // Download file
  const ext = format === 'markdown' ? 'md' : 'txt';
  const blob = new Blob([output], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `星辰对话_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.${ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('导出成功 ✓');
}

// ========== KEY HANDLER ==========
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    if (isStreaming) return;
    sendMessage();
  }
}

function usePrompt(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ========== CLEAR CHAT ==========
function clearChat() {
  messages = [];
  turnCount = 0;
  updateContextBadge();
  const c = document.getElementById('chatContainer');
  c.innerHTML = `
    <div class="welcome" id="welcomeBlock">
      <h2>🌟 星辰大海的边界</h2>
      <p>像跟福建喝茶聊天，聊投资、写文章、磨内容。<br>
      输入 <strong>/</strong> 唤出创作辅助指令，上传素材深度消化。</p>
    </div>
    <div class="quick-prompts" id="quickPrompts">
      <div class="quick-prompt" onclick="usePrompt('写一篇关于AI应用投资机会的文章')">📝 写AI分析</div>
      <div class="quick-prompt" onclick="usePrompt('A股春季行情复盘，请用你的风格写一篇')">📝 春季复盘</div>

      <div class="quick-prompt" onclick="usePrompt('帮我写一段关于"周期"的开头金句')">✍️ 金句创作</div>

// ========== MOBILE KEYBOARD ADAPTATION ==========
const inputEl = document.getElementById('userInput');
if (window.visualViewport) {
  const chatC = document.getElementById('chatContainer');
  function onVPResize() {
    const vv = window.visualViewport;
    const kbH = window.innerHeight - vv.height;
    if (kbH > 100) {
      document.body.style.height = vv.height + 'px';
      requestAnimationFrame(()=>{ chatC.scrollTop = chatC.scrollHeight; });
    } else {
      document.body.style.height = '';
    }
  }
  window.visualViewport.addEventListener('resize', onVPResize);
  window.visualViewport.addEventListener('scroll', onVPResize);
}
inputEl.addEventListener('focus', ()=>{
  setTimeout(()=>{ scrollToBottom(); inputEl.scrollIntoView({behavior:'smooth',block:'end'}); }, 300);
});
inputEl.addEventListener('blur', ()=>{ setTimeout(()=>{document.body.style.height='';},100); });
