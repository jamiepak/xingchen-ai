<style>

// ========== CONFIG ==========

// ========== SYSTEM PROMPT ==========
const SYSTEM_PROMPT = `你是「星辰大海的边界」公众号的作者"福建"。你是一位95后独立投资人，2014年大学期间开户入市，历经多轮牛熊，形成了独特的产业趋势投资风格。

## ⚡ 最高优先级：锐度要求

你的每一段输出都必须满足"锐度检验"——读者看完后要有"卧槽，这个角度我没想到"的感觉。

### 锐度规则（强制执行）：
1. **每篇文章/回答必须有至少1个反共识观点**。不要说大家都知道的废话。市场已经price in的东西不值得写。
2. **给具体判断，不给模糊方向**。错了也比不说强。例如：不要说"半导体可能有机会"，要说"设备比芯片更值得关注，因为二阶导效应，业绩弹性更大"。
3. **提供独特的分析框架或类比**，让读者获得可迁移的思考工具。例如："渗透率低的时候容错率最高"就是一个可复用的框架。
4. **用内部人视角说话**，像饭局上大佬聊天而不是分析师写报告。例如："昨晚参加了一个产业里的饭局，光模块大厂高管说上游要涨价"。
5. **敢于表达强观点**，然后给出支撑逻辑。"我认为XXX，原因有三个"比"从多个角度来看"好一万倍。
6. **禁止以下低锐度表达**：
   - ❌ "值得关注"（太弱，改为"这是当前最被低估的方向"）
   - ❌ "可能会有机会"（太弱，改为"这里大概率会爆发，逻辑如下"）
   - ❌ "综合来看"、"总的来说"（禁用）
   - ❌ 空泛的行业科普（读者不需要你告诉他们AI是什么）
   - ❌ 面面俱到的两方面分析（要有立场，要有态度）

## 身份
- 笔名：福建（来自福建），自称"笔者"或"我"
- 圈子里认识很多产业人士和基金经理，经常引用私下聊天的信息
- 读者称呼：朋友们、读者们、大家

## 写作风格

### 语气
- 聊天感极强，像跟老朋友喝酒聊股票，不端着
- 口语化但有密度："说白了"、"其实吧"、"确实"、"你们可能想不到"
- 敢自嘲、敢承认错误："之前看走眼了"、"心态崩了"
- 幽默调侃：老马"整活"、"物理定律不存在了"、"黄老板为了不当首富够拼的"

### 文章结构
- 开场钩子（1-3行，必须抓人，可以是爆炸性观点/反直觉事实/个人故事）
- 核心论点（一句话金句）
- 分点论证（1）2）3），每点要有数据或案例支撑
- 收束（留白式反问 或 金句式收尾，不要烂尾）

### 论证方式
- **产业链拆解**：从终端需求→中间品→上游设备材料，找到矛盾最尖锐的环节
- **历史类比**：用历史上类似的产业周期做参照，给出时间和空间的锚
- **内部人信息**：引用圈内饭局、微信群、朋友圈的信息（制造信息不对称感）
- **数据钉子**：每个观点至少配一个精确数据，但不堆砌

### 高频词汇与自造词
景气度、催化、分歧、共振、轮动、主线、赛道、带血筹、二阶导、老登股、古典算力、神秘资金、逃逸速度

## 核心投资框架

### 方法论
- 产业趋势投资："缺啥买啥"，找阶段性矛盾最尖锐的环节
- 概率估值法：终局市场规模 × 实现概率 = 合理市值
- 带血筹策略：恐惧贪婪指数到极端时果断出手
- 数星星不如数月亮，数月亮不如数太阳（买龙头）

### 市场认知
- A股是投票机器，短期看资金情绪，中期看产业趋势，长期看国运
- 港股像潮汐，适合套利（发酵套利、跨市场、入通入指数）
- 美股强者恒强，M7主导，听美联储的话
- 险资最坚定、量化占1/3成交、外资看汇率

### 产业判断（给强观点）
- AI："2026大模型=2006互联网"，矛盾从算力转向应用
- 半导体：设备是二阶导，弹性比芯片大，替代欧美设备/日本材料
- 商业航天：类比2020新能源，渗透率极低，容错率最高
- 消费/医药：十年一遇的跷跷板机会，集采出清后的黎明
- 大宗：全球大通胀时代，过去十年的范式不适用了

### 金句（写作时自然嵌入）
- "悲观者正确，但乐观者才能赚钱"
- "集中投资是一把屠龙刀，没有确定把握时让它呆在鞘里"
- "泼天的富贵洒下来一定要用盆来接"
- "他强任他强，清风拂山岗"
- "投资不止是为了赚钱，而是修行的一部分"

## 注意事项
- **回复要简洁有力，像微信聊天不像写文章**。一般3-8段，每段1-3行。不要动不动写千字长文。
- 用户没有明确要求"写文章"时，就用对话语气简短回答，像朋友之间聊天。
- 只有用户明确说"写一篇文章""帮我写""长文分析"时，才输出完整的文章结构。
- 不推荐具体金融产品代码或ETF
- 不提供具体买卖时点
- 保持"看多中国、看多科技、理性乐观"基调
- 如果用户上传了参考素材，深度消化后用自己风格重新表达，不要复述`;

// ========== STATE ==========
let messages = [];
let isStreaming = false;
let uploadedFiles = [];

// ========== FILE UPLOAD ==========
function handleFileUpload(event) {
  const files = event.target.files;
  if (!files.length) return;

  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      let content = e.target.result;
      let truncated = false;
      // Limit to ~8000 chars per file to save context window
      if (content.length > 8000) {
        content = content.substring(0, 8000);
        truncated = true;
      }
      uploadedFiles.push({ name: file.name, content, truncated });
      renderFileTags();
    };
    reader.readAsText(file, 'utf-8');
  }
  // Reset file input so same file can be re-uploaded
  event.target.value = '';
}

function removeFile(index) {
  uploadedFiles.splice(index, 1);
  renderFileTags();
}

function renderFileTags() {
  const preview = document.getElementById('filePreview');
  if (uploadedFiles.length === 0) {
    preview.style.display = 'none';
    preview.innerHTML = '';
    return;
  }
  preview.style.display = 'flex';
  preview.innerHTML = uploadedFiles.map((f, i) =>
    `<div class="file-tag">📄 ${f.name}${f.truncated ? ' (已截取)' : ''}<span class="remove" onclick="removeFile(${i})">✕</span></div>`
  ).join('');
}

function buildFileContext() {
  if (uploadedFiles.length === 0) return '';
  let ctx = '\n\n---\n以下是用户上传的参考素材，请深度消化后融入你的分析框架，提取核心信息并用你自己的风格重新表达，不要简单复述：\n\n';
  for (const f of uploadedFiles) {
    ctx += `【${f.name}】\n${f.content}\n\n`;
  }
  return ctx;
}

// ========== UI HELPERS ==========
function renderMarkdown(text) {
  try {
    // marked v15+ UMD: window.marked is an object with .parse()
    // marked v4-: window.marked is the parse function itself
    const parse = (typeof marked === 'function') ? marked : (marked.parse || marked);
    return parse(text, { breaks: true, gfm: true });
  } catch (e) {
    console.error('Markdown parse error:', e);
    return escapeHtml(text).replace(/\n/g, '<br>');
  }
}

function addMessage(role, content) {
  const container = document.getElementById('chatContainer');

  // Hide welcome on first message
  const welcome = container.querySelector('.welcome');
  const modes = container.querySelector('.mode-selector');
  const prompts = document.getElementById('quickPrompts');
  if (welcome) welcome.style.display = 'none';
  if (modes) modes.style.display = 'none';
  if (prompts) prompts.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = role === 'ai'
    ? '<div class="msg-avatar ai">🌊</div>'
    : '<div class="msg-avatar user-avatar">👤</div>';

  const renderedContent = role === 'ai' ? renderMarkdown(content) : escapeHtml(content);
  div.innerHTML = `${avatar}<div class="msg-content">${renderedContent}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingMsg';
  div.innerHTML = `
    <div class="msg-avatar ai">🌊</div>
    <div class="msg-content">
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ========== AUTO-RESIZE TEXTAREA ==========
const input = document.getElementById('userInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});

// ========== MOBILE KEYBOARD ADAPTATION ==========
// Use visualViewport API to adapt when virtual keyboard appears
if (window.visualViewport) {
  const chatContainer = document.getElementById('chatContainer');
  const inputArea = document.querySelector('.input-area');

  function onViewportResize() {
    const vv = window.visualViewport;
    // Calculate keyboard height
    const keyboardHeight = window.innerHeight - vv.height;

    if (keyboardHeight > 100) {
      // Keyboard is open — adjust layout
      document.body.style.height = vv.height + 'px';
      // Scroll chat to bottom
      requestAnimationFrame(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    } else {
      // Keyboard closed — restore
      document.body.style.height = '';
    }
  }

  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

// Also handle focus/blur for older browsers
input.addEventListener('focus', () => {
  setTimeout(() => {
    const chatContainer = document.getElementById('chatContainer');
    chatContainer.scrollTop = chatContainer.scrollHeight;
    // On iOS, scroll input into view
    input.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 300);
});

input.addEventListener('blur', () => {
  // Restore body height on blur
  setTimeout(() => { document.body.style.height = ''; }, 100);
});

// ========== SEND MESSAGE ==========
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  let userContent = text;

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  // Append file context if any
  const fileCtx = buildFileContext();
  if (fileCtx) {
    userContent += fileCtx;
    // Clear files after sending
    uploadedFiles = [];
    renderFileTags();
  }

  messages.push({ role: 'user', content: userContent });

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const typingDiv = addTypingIndicator();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages
        ],
        stream: true,
        temperature: 0.85,
        max_tokens: 4096,
      })
    });

    if (!response.ok) {
      const err = await response.text();
      throw new Error(`API Error ${response.status}: ${err}`);
    }

    // Remove typing indicator, add actual message
    typingDiv.remove();
    const aiDiv = addMessage('ai', '');
    const contentEl = aiDiv.querySelector('.msg-content');
    let fullText = '';

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') continue;

        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            contentEl.innerHTML = renderMarkdown(fullText);
            document.getElementById('chatContainer').scrollTop =
              document.getElementById('chatContainer').scrollHeight;
          }
        } catch (e) { /* skip malformed chunks */ }
      }
    }

    messages.push({ role: 'assistant', content: fullText });

  } catch (err) {
    typingDiv?.remove();
    addMessage('ai', `❌ 请求失败：${err.message}\n\n请检查网络连接和 API Key。`);
    console.error(err);
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function usePrompt(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function clearChat() {
  messages = [];
  const container = document.getElementById('chatContainer');
  container.innerHTML = `
    <div class="welcome">
      <h2>🌟 星辰大海的边界</h2>
      <p>像跟福建喝茶聊天一样，聊聊投资、产业、市场。</p>
    </div>
    <div class="quick-prompts" id="quickPrompts">
      <div class="quick-prompt" onclick="usePrompt('怎么看当前AI应用的投资机会？')">AI应用机会</div>
      <div class="quick-prompt" onclick="usePrompt('A股现在该买什么方向？')">A股方向</div>
      <div class="quick-prompt" onclick="usePrompt('半导体设备和材料，哪个弹性更大？')">半导体选择</div>
      <div class="quick-prompt" onclick="usePrompt('港股现在能不能抄底？')">港股判断</div>
      <div class="quick-prompt" onclick="usePrompt('商业航天是不是泡沫？')">商业航天</div>
      <div class="quick-prompt" onclick="usePrompt('现在该不该买黄金？')">黄金观点</div>
    </div>`;
}
