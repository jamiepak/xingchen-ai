## 禁忌

// ========== STATE ==========
let messages = [];
let isStreaming = false;
let uploadedFiles = [];

// ========== FILE UPLOAD (支持 Word/PPT/PDF) ==========
async function handleFileUpload(event) {
  const files = event.target.files;
  if (!files.length) return;

  for (const file of files) {
    const ext = file.name.split('.').pop().toLowerCase();
    try {
      let content = '';
      let truncated = false;

      if (ext === 'docx' || ext === 'doc') {
        // Word 文件用 mammoth.js 解析
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        content = result.value;
      } else if (ext === 'pptx' || ext === 'ppt') {
        // PPT 文件：提取 XML 中的文本
        content = await extractPptxText(file);
      } else if (ext === 'pdf') {
        // PDF 文件用 pdf.js 解析
        content = await extractPdfText(file);
      } else {
        // 文本类文件直接读取
        content = await file.text();
      }

      if (content.length > 12000) {
        content = content.substring(0, 12000);
        truncated = true;
      }

      if (content.trim()) {
        uploadedFiles.push({ name: file.name, content, truncated });
        renderFileTags();
      }
    } catch (e) {
      console.error('File parse error:', e);
      // 降级：尝试直接读文本
      try {
        let content = await file.text();
        if (content.length > 12000) content = content.substring(0, 12000);
        if (content.trim()) {
          uploadedFiles.push({ name: file.name, content, truncated: content.length >= 12000 });
          renderFileTags();
        }
      } catch (e2) {
        alert('无法解析文件: ' + file.name);
      }
    }
  }
  event.target.value = '';
}

async function extractPptxText(file) {
  // PPTX 是 ZIP 格式，解压后从 slide XML 中提取文本
  const JSZip = window.JSZip;
  if (!JSZip) {
    // 如果没有 JSZip，降级读取
    return await file.text();
  }
  const zip = await JSZip.loadAsync(file);
  let text = '';
  const slideFiles = Object.keys(zip.files).filter(n => n.match(/ppt\/slides\/slide\d+\.xml/)).sort();
  for (const sf of slideFiles) {
    const xml = await zip.files[sf].async('string');
    // 提取 <a:t> 标签中的文本
    const matches = xml.match(/<a:t[^>]*>(.*?)<\/a:t>/g);
    if (matches) {
      const slideText = matches.map(m => m.replace(/<[^>]+>/g, '')).join(' ');
      text += slideText + '\n\n';
    }
  }
  return text || '(PPT内容提取失败，请尝试复制文本后粘贴)';
}

async function extractPdfText(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdfjsLib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
    if (!pdfjsLib) {
      return '(PDF解析库未加载，请尝试复制文本后粘贴)';
    }
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    const maxPages = Math.min(pdf.numPages, 30); // 限制页数
    for (let i = 1; i <= maxPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n\n';
    }
    return text;
  } catch (e) {
    return '(PDF解析失败: ' + e.message + ')';
  }
}

function removeFile(index) {
  uploadedFiles.splice(index, 1);
  renderFileTags();
}

function renderFileTags() {
  const preview = document.getElementById('filePreview');
  if (uploadedFiles.length === 0) {
    preview.style.display = 'none';
    preview.innerHTML = '';
    return;
  }
  preview.style.display = 'flex';
  preview.innerHTML = uploadedFiles.map((f, i) =>
    `<div class="file-tag">📄 ${f.name}${f.truncated ? ' (已截取)' : ''}<span class="remove" onclick="removeFile(${i})">✕</span></div>`
  ).join('');
}

function buildFileContext() {
  if (uploadedFiles.length === 0) return '';
  let ctx = '\n\n---\n以下是用户上传的参考素材，请深度消化后融入你的分析框架，用你自己的风格重新表达，不要简单复述：\n\n';
  for (const f of uploadedFiles) {
    ctx += `【${f.name}】\n${f.content}\n\n`;
  }
  return ctx;
}

// ========== UI HELPERS ==========
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderMarkdown(text) {
  try {
    const parse = (typeof marked === 'function') ? marked : (marked.parse || marked);
    return parse(text, { breaks: true, gfm: true });
  } catch (e) {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }
}

function addMessage(role, content) {
  const container = document.getElementById('chatContainer');
  const welcome = container.querySelector('.welcome');
  const prompts = document.getElementById('quickPrompts');
  if (welcome) welcome.style.display = 'none';
  if (prompts) prompts.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = role === 'ai'
    ? '<div class="msg-avatar ai">🌊</div>'
    : '<div class="msg-avatar user-avatar">👤</div>';
  const rendered = role === 'ai' ? renderMarkdown(content) : escapeHtml(content);
  div.innerHTML = `${avatar}<div class="msg-content">${rendered}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function usePrompt(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMessage();
  }
}

// ========== SEND MESSAGE ==========
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  let userContent = text;
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  const fileCtx = buildFileContext();
  if (fileCtx) {
    userContent += fileCtx;
    uploadedFiles = [];
    renderFileTags();
  }

  messages.push({ role: 'user', content: userContent });

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const aiDiv = addMessage('ai', '');
  const contentEl = aiDiv.querySelector('.msg-content');
  contentEl.classList.add('typing');

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages.slice(-12)],
        stream: true,
        max_tokens: 2000,
        temperature: 0.85,
      }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ') || line.includes('[DONE]')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          const delta = data.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            contentEl.innerHTML = renderMarkdown(fullText);
            document.getElementById('chatContainer').scrollTop =
              document.getElementById('chatContainer').scrollHeight;
          }
        } catch {}
      }
    }

    contentEl.classList.remove('typing');
    messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    contentEl.classList.remove('typing');
    contentEl.innerHTML = `<span style="color:#f85149">请求失败: ${err.message}</span>`;
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

// ========== AUTO-RESIZE TEXTAREA ==========
const input = document.getElementById('userInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ========== MOBILE KEYBOARD ADAPTATION ==========
if (window.visualViewport) {
  const chatContainer = document.getElementById('chatContainer');
  function onViewportResize() {
    const vv = window.visualViewport;
    const keyboardHeight = window.innerHeight - vv.height;
    if (keyboardHeight > 100) {
      document.body.style.height = vv.height + 'px';
      requestAnimationFrame(() => { chatContainer.scrollTop = chatContainer.scrollHeight; });
    } else {
      document.body.style.height = '';
    }
  }
  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

input.addEventListener('focus', () => {
  setTimeout(() => {
    document.getElementById('chatContainer').scrollTop =
      document.getElementById('chatContainer').scrollHeight;
    input.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 300);
});
input.addEventListener('blur', () => {
  setTimeout(() => { document.body.style.height = ''; }, 100);
});

// ========== LOAD JSZip for PPTX (lazy) ==========
(function loadJSZip() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
  document.head.appendChild(s);
})();

// ========== LOAD PDF.js worker ==========
(function loadPdfWorker() {
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
  }
  // Retry after script loads
  setTimeout(() => {
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
    }
  }, 2000);
})();
</script>
